# Scheduled regression: scoring and parsing. Catches regressions without blocking every push.
# Runs weekly. Set OPENAI_API_KEY in repo secrets to run training verification with LLM (optional).

name: Regression

on:
  schedule:
    # Monday 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch: # allow manual run

jobs:
  training-verification:
    name: Training score verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: pip install -r projects/meridian/api/requirements.txt
      - name: Verify training scores
        run: python projects/meridian/scripts/verify_training_scores.py
        env:
          MERIDIAN_USE_LLM: "0"
          # Optional: set OPENAI_API_KEY in repo secrets to use LLM for verification
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  parsing-regression:
    name: Parsing regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: pip install -r projects/meridian/api/requirements.txt
      - name: Parsing regression
        run: python projects/meridian/scripts/parsing_regression.py
