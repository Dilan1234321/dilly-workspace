# Development automations: lint, test, build, API smoke on push/PR.
# Dilly dashboard: projects/dilly/dashboard
# @dilly/api is a local workspace package — install from projects/dilly/ root.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: .

jobs:
  # --- Dilly dashboard ---
  dilly-dashboard-lint:
    name: Dilly dashboard lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: projects/dilly
      - run: npm run lint
        working-directory: projects/dilly/dashboard
      - run: npx tsc --noEmit
        working-directory: projects/dilly/dashboard

  dilly-dashboard-test:
    name: Dilly dashboard tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: projects/dilly
      - run: npm run test
        working-directory: projects/dilly/dashboard

  dilly-dashboard-build:
    name: Dilly dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: projects/dilly
      - run: npm run build
        working-directory: projects/dilly/dashboard
        env:
          NEXT_PUBLIC_API_URL: "https://api.example.com"

  # --- API ---
  api-smoke:
    name: API smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: pip install -r projects/dilly/requirements.txt
      - name: Run smoke test (TestClient, no server)
        run: python projects/dilly/scripts/smoke_test_path.py
        env:
          MERIDIAN_USE_LLM: "0"
      - name: Run profile API test
        run: python projects/dilly/scripts/test_profile_api.py
