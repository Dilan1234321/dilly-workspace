# Development automations: lint, test, API smoke on push/PR.
# No OPENAI_API_KEY needed when MERIDIAN_USE_LLM is unset (rule-based audit).
# Meridian dashboard: projects/meridian/dashboard · Dilly dashboard: projects/dilly/dashboard

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: .

jobs:
  # --- Meridian (legacy) dashboard ---
  dashboard-lint:
    name: Meridian dashboard lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: projects/meridian/dashboard/package-lock.json
      - run: npm ci
        working-directory: projects/meridian/dashboard
      - run: npm run lint
        working-directory: projects/meridian/dashboard

  dashboard-test:
    name: Meridian dashboard tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: projects/meridian/dashboard/package-lock.json
      - run: npm ci
        working-directory: projects/meridian/dashboard
      - run: npm run test
        working-directory: projects/meridian/dashboard

  # --- Dilly dashboard (student app) ---
  dilly-dashboard-lint:
    name: Dilly dashboard lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: projects/dilly/dashboard/package-lock.json
      - run: npm ci
        working-directory: projects/dilly/dashboard
      - run: npm run lint
        working-directory: projects/dilly/dashboard
      - run: npx tsc --noEmit
        working-directory: projects/dilly/dashboard

  dilly-dashboard-test:
    name: Dilly dashboard tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: projects/dilly/dashboard/package-lock.json
      - run: npm ci
        working-directory: projects/dilly/dashboard
      - run: npm run test
        working-directory: projects/dilly/dashboard

  api-smoke:
    name: API smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: pip install -r projects/meridian/api/requirements.txt
      - name: Run smoke test (TestClient, no server)
        run: python projects/meridian/scripts/smoke_test_path.py
        env:
          MERIDIAN_USE_LLM: "0"
      - name: Run profile API test
        run: python projects/meridian/scripts/test_profile_api.py

  dashboard-build:
    name: Meridian dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: projects/meridian/dashboard/package-lock.json
      - run: npm ci
        working-directory: projects/meridian/dashboard
      - run: npm run build
        working-directory: projects/meridian/dashboard
        env:
          NEXT_PUBLIC_API_URL: "https://api.example.com"

  dilly-dashboard-build:
    name: Dilly dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: projects/dilly/dashboard/package-lock.json
      - run: npm ci
        working-directory: projects/dilly/dashboard
      - run: npm run build
        working-directory: projects/dilly/dashboard
        env:
          NEXT_PUBLIC_API_URL: "https://api.example.com"
